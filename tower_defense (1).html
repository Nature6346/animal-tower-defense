<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Tower Defense</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Arial',sans-serif;background:#1a1a2e;color:#eee;}
.screen{display:none;width:100%;height:100%;}
.screen.active{display:flex;}

/* LOBBY */
#lobby{flex-direction:column;align-items:center;justify-content:center;gap:14px;position:relative;overflow:hidden;}
#lobby-bg{position:absolute;inset:0;pointer-events:none;}
#lobby-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:14px;}
#lobby h1{font-size:52px;color:#f0c040;text-shadow:0 0 32px #f0c04099;letter-spacing:2px;}
.lobby-coins{font-size:18px;color:#f0c040;display:flex;gap:20px;background:rgba(0,0,0,.4);padding:8px 20px;border-radius:20px;border:1px solid #f0c04044;}
.lobby-btn{width:240px;padding:14px;font-size:17px;border:none;border-radius:12px;cursor:pointer;font-weight:bold;transition:transform .12s,filter .12s,box-shadow .12s;}
.lobby-btn:hover{transform:scale(1.05);filter:brightness(1.2);box-shadow:0 4px 20px rgba(0,0,0,.5);}
#btn-play{background:linear-gradient(135deg,#4caf50,#2e7d32);color:#fff;}
#btn-chars{background:linear-gradient(135deg,#2196f3,#1565c0);color:#fff;}
#btn-deck{background:linear-gradient(135deg,#9c27b0,#6a1b9a);color:#fff;}

/* PANELS */
.panel-screen{flex-direction:column;align-items:center;padding:24px 16px;gap:14px;overflow-y:auto;}
.panel-screen h2{font-size:28px;color:#f0c040;}
.back-btn{padding:7px 18px;background:#444;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;align-self:flex-start;}
.back-btn:hover{background:#666;}

/* CHAR CARDS — max 4 per row */
.char-grid{display:grid;grid-template-columns:repeat(4,170px);gap:14px;justify-content:center;}
@media(max-width:760px){.char-grid{grid-template-columns:repeat(2,170px);}}
.char-card{background:#16213e;border:2px solid #444;border-radius:12px;padding:14px;text-align:center;position:relative;}
.char-card.owned{border-color:#4caf50;}
.char-card.locked{border-color:#555;opacity:.75;}
.char-emoji{font-size:40px;}
.char-name{font-size:15px;font-weight:bold;margin:5px 0 6px;}
.char-stat{font-size:11px;color:#aaa;text-align:left;margin:2px 0;}
.char-rarity{font-size:10px;font-weight:bold;padding:2px 6px;border-radius:4px;display:inline-block;margin-bottom:5px;}
.rarity-normal{background:#455a64;color:#eee;}
.rarity-rare{background:#1565c0;color:#90caf9;}
.rarity-epic{background:#6a1b9a;color:#ce93d8;}
.char-badge{position:absolute;top:7px;right:7px;font-size:10px;padding:2px 5px;border-radius:5px;font-weight:bold;}
.badge-owned{background:#4caf50;color:#fff;}
.badge-locked{background:#666;color:#fff;}
.unlock-btn{width:100%;margin-top:8px;padding:7px;background:#1565c0;color:#90caf9;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:bold;}
.unlock-btn:hover:not(:disabled){background:#1976d2;}
.unlock-btn:disabled{opacity:.4;cursor:default;}

/* DECK */
.deck-area{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;background:#0f3460;border-radius:10px;padding:14px;width:100%;max-width:520px;}
.deck-slot{width:84px;height:84px;border:2px dashed #555;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:34px;cursor:pointer;position:relative;background:#111;}
.deck-slot.filled{border-color:#4caf50;background:#16213e;}
.deck-slot .remove-x{position:absolute;top:2px;right:4px;font-size:13px;color:#f44;cursor:pointer;display:none;}
.deck-slot.filled .remove-x{display:block;}
.owned-list{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;}
.owned-card{background:#16213e;border:2px solid #4caf50;border-radius:9px;padding:9px 12px;font-size:26px;cursor:pointer;text-align:center;}
.owned-card:hover{background:#1f3a5f;}
.owned-card span{display:block;font-size:10px;color:#aaa;}
.save-deck-btn{padding:11px 28px;background:#9c27b0;color:#fff;border:none;border-radius:9px;font-size:15px;cursor:pointer;font-weight:bold;}
.save-deck-btn:hover{background:#ba4fd4;}

/* DIFF */
#diff-screen{gap:10px;}
.diff-btn{width:240px;padding:12px;font-size:15px;border:none;border-radius:9px;cursor:pointer;font-weight:bold;transition:transform .1s;}
.diff-btn:hover{transform:scale(1.03);}

/* GAME SCREEN */
#game-screen{flex-direction:row;width:100%;height:100%;overflow:hidden;}

/* LEFT PANEL */
#left-panel{width:165px;min-width:165px;height:100%;background:#0d1b2a;border-right:2px solid #1e3a5f;display:flex;flex-direction:column;overflow:hidden;}
#left-panel-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#334;font-size:12px;gap:7px;padding:14px;text-align:center;}
#upg-panel{display:none;flex-direction:column;flex:1;padding:12px;gap:6px;overflow-y:auto;}
#upg-panel h3{color:#f0c040;font-size:14px;border-bottom:1px solid #1e3a5f;padding-bottom:6px;margin-bottom:2px;}
.upg-stat{background:#111e2e;border-radius:7px;padding:8px;}
.upg-stat-label{font-size:10px;color:#667;margin-bottom:1px;}
.upg-stat-val{font-size:14px;font-weight:bold;color:#eee;}
.upg-stat-next{font-size:10px;color:#4caf50;margin-top:1px;}
.upg-btn-row{display:flex;gap:5px;}
#upg-btn{flex:1;padding:9px;background:#9c27b0;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:bold;}
#upg-btn:hover:not(:disabled){background:#ba4fd4;}
#upg-btn:disabled{opacity:.4;cursor:default;}
#sell-btn{flex:1;padding:9px;background:#b71c1c;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;}
#sell-btn:hover{background:#e53935;}
#target-btn{width:100%;padding:7px;background:#0d2040;color:#4fc3f7;border:1px solid #1e5070;border-radius:7px;cursor:pointer;font-size:11px;font-weight:bold;}
#target-btn:hover{background:#1a3050;}
#close-upg-btn{width:100%;padding:6px;background:#1e2d3e;color:#aaa;border:none;border-radius:7px;cursor:pointer;font-size:11px;}
#close-upg-btn:hover{background:#2a3f52;color:#fff;}
.key-hint{font-size:9px;color:#446;margin-top:2px;text-align:center;}

/* CENTER */
#center-area{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
#canvas-wrap{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
#game{display:block;}
#wave-bar-wrap{position:absolute;bottom:0;left:0;right:0;height:4px;background:#0a1628;}
#wave-bar{height:100%;background:#f0c040;transition:width .08s;}
#msg{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#ccc;font-size:11px;padding:4px 14px;border-radius:18px;pointer-events:none;white-space:nowrap;}

/* RIGHT PANEL */
#right-panel{width:145px;min-width:145px;height:100%;background:#0d1b2a;border-left:2px solid #1e3a5f;display:flex;flex-direction:column;overflow-y:auto;}
.rpanel-section{padding:10px;border-bottom:1px solid #1e3a5f;}
.rpanel-title{font-size:10px;color:#557;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
.speed-row{display:flex;gap:4px;}
.spd-btn{flex:1;padding:6px 2px;background:#111e2e;border:2px solid #1e3a5f;color:#aaa;border-radius:7px;cursor:pointer;font-size:11px;font-weight:bold;}
.spd-btn.active{background:#1e3a5f;border-color:#4fc3f7;color:#4fc3f7;}
.spd-btn:hover:not(.active){background:#1a2d42;}
.skip-btn{width:100%;padding:8px;background:#1a2d42;border:2px solid #2e5177;color:#eee;border-radius:7px;cursor:pointer;font-size:12px;margin-top:5px;}
.skip-btn:hover:not(:disabled){background:#243d57;}
.skip-btn.auto-on{background:#0d3320;border-color:#4caf50;color:#4caf50;}
.skip-btn:disabled{opacity:.35;cursor:default;}
.shop-card{background:#111e2e;border:2px solid #1e3a5f;border-radius:9px;padding:8px;cursor:pointer;margin-bottom:6px;transition:border-color .1s;}
.shop-card:hover{border-color:#4fc3f7;}
.shop-card.selected{border-color:#4caf50;background:#0d2a1a;}
.shop-card-top{display:flex;align-items:center;gap:6px;font-size:16px;}
.shop-card-name{font-size:12px;font-weight:bold;}
.shop-card-cost{font-size:11px;color:#f0c040;margin-top:2px;}
/* 돈 표시 박스 */
#cash-box{margin:8px;background:#111e2e;border:2px solid #f0c040;border-radius:10px;padding:10px;text-align:center;}
#cash-box .cash-label{font-size:10px;color:#888;margin-bottom:2px;}
#cash-box .cash-val{font-size:20px;font-weight:bold;color:#f0c040;}
/* 나가기 버튼 */
#exit-btn{margin:8px;padding:8px;background:#4a1a1a;border:1px solid #8b3333;color:#ff7070;border-radius:8px;cursor:pointer;font-size:12px;font-weight:bold;}
#exit-btn:hover{background:#6a2222;}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby" class="screen">
  <canvas id="lobby-bg"></canvas>
  <div id="lobby-content">
    <h1>🏰 Tower Defense</h1>
    <div class="lobby-coins">
      <span>💎 <span id="lobby-diamond">0</span> 다이아</span>
    </div>
    <button class="lobby-btn" id="btn-play">▶ 플레이</button>
    <button class="lobby-btn" id="btn-chars">🐧 캐릭터</button>
    <button class="lobby-btn" id="btn-deck">🃏 캐릭터 편성</button>
  </div>
</div>

<!-- CHARACTER -->
<div id="char-screen" class="screen panel-screen">
  <button class="back-btn" id="char-back">← 뒤로</button>
  <h2>🐧 캐릭터</h2>
  <div class="char-grid" id="char-grid"></div>
</div>

<!-- DECK -->
<div id="deck-screen" class="screen panel-screen">
  <button class="back-btn" id="deck-back">← 뒤로</button>
  <h2>🃏 캐릭터 편성</h2>
  <p style="color:#aaa;font-size:12px">덱 슬롯(5개)에 캐릭터를 넣으세요</p>
  <div class="deck-area" id="deck-slots"></div>
  <h3 style="color:#aaa;font-size:13px;margin-top:7px">보유 캐릭터</h3>
  <div class="owned-list" id="owned-list"></div>
  <button class="save-deck-btn" id="save-deck">저장</button>
</div>

<!-- DIFFICULTY -->
<div id="diff-screen" class="screen panel-screen">
  <button class="back-btn" id="diff-back">← 뒤로</button>
  <h2>난이도 선택</h2>
  <button class="diff-btn" style="background:linear-gradient(135deg,#4caf50,#2e7d32);color:#fff" onclick="startGame('easy')">Easy (10웨이브)</button>
  <button class="diff-btn" style="background:linear-gradient(135deg,#2196f3,#1565c0);color:#fff" onclick="startGame('medium')">Medium (15웨이브)</button>
  <button class="diff-btn" style="background:linear-gradient(135deg,#ff9800,#e65100);color:#fff" onclick="startGame('hard')">Hard (20웨이브 / 두 갈래)</button>
  <button class="diff-btn" style="background:linear-gradient(135deg,#f44336,#b71c1c);color:#fff" onclick="startGame('impossible')">Impossible (30웨이브 / 두 갈래)</button>
  <button class="diff-btn" style="background:linear-gradient(135deg,#9c27b0,#6a1b9a);color:#fff" onclick="startGame('infinite')">Infinite ∞ (두 갈래)</button>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <!-- LEFT -->
  <div id="left-panel">
    <div id="left-panel-empty">
      <span style="font-size:28px">🗼</span>
      타워를 클릭하면<br>정보가 표시됩니다
      <div class="key-hint">E:업글 X:판매 R:타겟변경 T:닫기</div>
    </div>
    <div id="upg-panel">
      <h3 id="upg-title">타워</h3>
      <div class="upg-stat"><div class="upg-stat-label">레벨</div><div class="upg-stat-val" id="upg-lv-val">1/3</div></div>
      <div class="upg-stat"><div class="upg-stat-label">⚔️ 공격력</div><div class="upg-stat-val" id="upg-atk-val">—</div><div class="upg-stat-next" id="upg-atk-next"></div></div>
      <div class="upg-stat"><div class="upg-stat-label">📡 사거리</div><div class="upg-stat-val" id="upg-range-val">—</div><div class="upg-stat-next" id="upg-range-next"></div></div>
      <div class="upg-stat"><div class="upg-stat-label">⏱ 쿨다운</div><div class="upg-stat-val" id="upg-cd-val">—</div><div class="upg-stat-next" id="upg-cd-next"></div></div>
      <div class="upg-btn-row">
        <button id="upg-btn">업그레이드<br><span style="font-size:9px;opacity:.7">[E]</span></button>
        <button id="sell-btn">판매<br><span style="font-size:9px;opacity:.7">[X]</span></button>
      </div>
      <button id="target-btn">타겟: First [R]</button>
      <button id="close-upg-btn">✕ 닫기 [T]</button>
      <div class="key-hint" id="invest-label">총 투자: 0캐쉬</div>
    </div>
  </div>

  <!-- CENTER -->
  <div id="center-area">
    <div id="canvas-wrap">
      <canvas id="game"></canvas>
      <div id="wave-bar-wrap"><div id="wave-bar" style="width:100%"></div></div>
      <div id="msg">클릭해서 타워를 설치하세요</div>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="right-panel">
    <div class="rpanel-section">
      <div class="rpanel-title">배속</div>
      <div class="speed-row">
        <button class="spd-btn active" id="spd1" onclick="setSpeed(1)">1×</button>
        <button class="spd-btn" id="spd2" onclick="setSpeed(2)">2×</button>
        <button class="spd-btn" id="spd3" onclick="setSpeed(3)">3×</button>
      </div>
    </div>
    <div class="rpanel-section">
      <div class="rpanel-title">웨이브</div>
      <button class="skip-btn" id="skip-btn" onclick="skipWave()" disabled>⏭ 스킵 (잠김)</button>
    </div>
    <div class="rpanel-section" style="flex:1">
      <div class="rpanel-title">타워 선택</div>
      <div id="tower-shop"></div>
    </div>
    <div id="cash-box">
      <div class="cash-label">💵 캐쉬</div>
      <div class="cash-val" id="h-cash">0</div>
    </div>
    <button id="exit-btn" onclick="exitToLobby()">🚪 나가기</button>
  </div>
</div>

// ═══════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════
const TILE=48;
const SPEED={
  very_slow:0.5*TILE/60,
  slow:0.75*TILE/60,
  normal:1.0*TILE/60,
  fast:1.25*TILE/60,
  very_fast:1.5*TILE/60,
};

// ═══════════════════════════════════════
//  SAVE
// ═══════════════════════════════════════
// SAVE — 키 절대 바꾸지 말 것
const SAVE_KEY="td_save";
const OLD_KEYS=["td_v1","td_v2","td_v3","td_v4","td_v5","td_save_v1"];
let saveData=loadSave();

function loadSave(){
  try{
    const cur=localStorage.getItem(SAVE_KEY);
    if(cur){
      const d=JSON.parse(cur);
      return{diamonds:d.diamonds??0,ownedChars:d.ownedChars??[1],deck:d.deck??[1,null,null,null,null]};
    }
    // 구버전 마이그레이션
    for(const old of OLD_KEYS){
      const raw=localStorage.getItem(old);
      if(raw){
        const d=JSON.parse(raw);
        const m={diamonds:d.diamonds??0,ownedChars:d.ownedChars??[1],deck:d.deck??[1,null,null,null,null]};
        localStorage.setItem(SAVE_KEY,JSON.stringify(m));
        localStorage.removeItem(old);
        return m;
      }
    }
  }catch(e){}
  return{diamonds:0,ownedChars:[1],deck:[1,null,null,null,null]};
}
function persistSave(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(saveData));}catch(e){}}

// ═══════════════════════════════════════
//  DIFFICULTY
// ═══════════════════════════════════════
const DIFF={
  easy:     {waves:10, startCash:75, baseMul:0.8,  lives:15,diamondClear:10,cashPerWave:25,cashBonus:1,hardMode:false},

// ═══════════════════════════════════════
//  ENEMY BASE

function getWaveEnemies(diff,wave){
  if(diff==="easy")   return WAVE_EASY[Math.min(wave-1,WAVE_EASY.length-1)];
  if(diff==="medium") return WAVE_MEDIUM[Math.min(wave-1,WAVE_MEDIUM.length-1)];
  if(diff==="hard")   return WAVE_HARD[Math.min(wave-1,WAVE_HARD.length-1)];
  if(diff==="impossible") return WAVE_HARD[Math.min(wave-1,WAVE_HARD.length-1)];// 임파는 hard 테이블 + 3배율
  // infinite: easy 테이블 순환
  return WAVE_EASY[(wave-1)%WAVE_EASY.length];
}

function getHpMul(diff,wave){
  if(diff==="infinite") return 1.0 + (wave-1)*0.1; // 웨이브당 10% 고정
  const base=DIFF[diff].baseMul;
  return base * Math.pow(1.03, wave-1); // 일반모드 웨이브당 3%
}

// 비율좌표로 생성, 실제 px는 렌더 시 계산
let obstacles=[];
function genObstacles(diff){
  obstacles=[];
  const rng=(s)=>{let x=Math.sin(s)*43758.5453;return x-Math.floor(x);};
  const count=10;
  for(let i=0;i<count;i++){
    const rx=0.2+rng(i*3+1)*0.6;
    const ry=0.1+rng(i*3+2)*0.8;
    obstacles.push({rx,ry,type:"rock",r:18});
  }
}
function obsOnPath(ox,oy){
  const paths=getActivePaths();
  for(const P of paths){
    for(let i=0;i<P.length-1;i++){
      const a=P[i],b=P[i+1];
      const dx=b.x-a.x,dy=b.y-a.y,len=Math.hypot(dx,dy);
      if(!len)continue;
      const nx=dy/len,ny=-dx/len,px=ox-a.x,py=oy-a.y;
      if(Math.abs(px*nx+py*ny)<50&&(px*dx+py*dy)/len>-10&&(px*dx+py*dy)/len<len+10)return true;
    }
  }
  return false;
}
function filterObstacles(){
  const W=canvas.width,H=canvas.height;
  obstacles=obstacles.filter(o=>{
    const ox=o.rx*W,oy=o.ry*H;
    return !obsOnPath(ox,oy);
  });
}
function drawObstacles(){
  const W=canvas.width,H=canvas.height;
  for(const o of obstacles){
    const x=o.rx*W,y=o.ry*H;
    ctx.save();ctx.translate(x,y);
    if(o.type==="tree"){
      // 그림자
      ctx.fillStyle="rgba(0,0,0,.18)";
      ctx.beginPath();ctx.ellipse(4,14,13,5,0,0,Math.PI*2);ctx.fill();
      // 줄기
      const grad=ctx.createLinearGradient(-4,0,4,0);
      grad.addColorStop(0,"#5d4037");grad.addColorStop(1,"#8d6e63");
      ctx.fillStyle=grad;
      ctx.beginPath();ctx.roundRect(-4,2,8,14,2);ctx.fill();
      // 잎 (3겹)
      ctx.fillStyle="#1b5e20";
      ctx.beginPath();ctx.arc(0,-20,14,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#2e7d32";
      ctx.beginPath();ctx.arc(-3,-26,11,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#388e3c";
      ctx.beginPath();ctx.arc(2,-31,8,0,Math.PI*2);ctx.fill();
      // 하이라이트
      ctx.fillStyle="rgba(255,255,255,.12)";
      ctx.beginPath();ctx.arc(-3,-28,5,0,Math.PI*2);ctx.fill();
    }else if(o.type==="rock"){
      // 그림자
      ctx.fillStyle="rgba(0,0,0,.2)";
      ctx.beginPath();ctx.ellipse(3,12,16,5,0,0,Math.PI*2);ctx.fill();
      // 큰 돌
      const g=ctx.createRadialGradient(-3,-3,2,0,0,16);
      g.addColorStop(0,"#90a4ae");g.addColorStop(1,"#37474f");
      ctx.fillStyle=g;
      ctx.beginPath();
      ctx.moveTo(-14,6);ctx.bezierCurveTo(-16,-8,-8,-16,2,-14);
      ctx.bezierCurveTo(14,-12,16,-2,12,8);
      ctx.bezierCurveTo(8,16,-6,14,-14,6);
      ctx.fill();
      // 작은 돌
      const g2=ctx.createRadialGradient(8,3,1,10,4,8);
      g2.addColorStop(0,"#b0bec5");g2.addColorStop(1,"#546e7a");
      ctx.fillStyle=g2;
      ctx.beginPath();ctx.ellipse(10,4,7,5,.3,0,Math.PI*2);ctx.fill();
      // 이끼
      ctx.fillStyle="rgba(76,175,80,.3)";
      ctx.beginPath();ctx.ellipse(-4,-6,6,4,-.4,0,Math.PI*2);ctx.fill();
      // 하이라이트
      ctx.fillStyle="rgba(255,255,255,.2)";
      ctx.beginPath();ctx.ellipse(-5,-5,5,3,-.3,0,Math.PI*2);ctx.fill();
    }else{ // bush
      // 그림자
      ctx.fillStyle="rgba(0,0,0,.15)";
      ctx.beginPath();ctx.ellipse(2,10,14,4,0,0,Math.PI*2);ctx.fill();
      // 풀 줄기들
      const stems=[[-6,8],[-3,8],[0,8],[3,8],[6,8]];
      ctx.strokeStyle="#33691e";ctx.lineWidth=2;ctx.lineCap="round";
      stems.forEach(([sx,sy])=>{
        ctx.beginPath();
        ctx.moveTo(sx,sy);
        ctx.quadraticCurveTo(sx+(Math.sin(sx)*3),sy-10,sx+(Math.sin(sx)*5),sy-16);
        ctx.stroke();
      });
      // 덤불 뭉치
      const colors=["#1b5e20","#2e7d32","#388e3c","#43a047"];
      [[-6,0,9],[ 5,-2,8],[ 0,-5,10],[-4,-8,7],[6,-6,7]].forEach(([bx,by,br],i)=>{
        ctx.fillStyle=colors[i%colors.length];
        ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();
      });
      // 하이라이트
      ctx.fillStyle="rgba(255,255,255,.1)";
      ctx.beginPath();ctx.arc(-2,-5,5,0,Math.PI*2);ctx.fill();
      // 꽃
      ctx.fillStyle="#ffee58";
      ctx.beginPath();ctx.arc(5,-8,2.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(-6,-3,2,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
}
function isOnWater(x,y){
  if(currentDiff!=="easy"&&currentDiff!=="medium") return false;
  const col=Math.floor(x/canvas.width*21);
  const row=Math.floor(y/canvas.height*17);
  const waterTiles=[
    [13,2],[14,2],[2,3],[3,3],[13,3],[14,3],[2,4],[3,4],[13,4],[14,4],
    [2,5],[3,5],[2,6],[2,10],[3,10],[2,11],[3,11],[2,12],
    [8,12],[9,12],[8,13],[9,13],[8,14],[9,14],[9,15],
  ];
  return waterTiles.some(([tx,ty])=>tx===col&&ty===row);
}
function isOnObstacle(x,y){
  const W=canvas.width,H=canvas.height;
  for(const o of obstacles){

let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
let lobbyMusicNodes=[];
let gameMusicNodes=[];

function playLobbyMusic(){
  stopAllMusic();
  const ac=getAudio();
  // 밝고 경쾌한 멜로디
  const notes=[261,293,329,349,392,349,329,293];
  const masterGain=ac.createGain();masterGain.gain.value=0.08;masterGain.connect(ac.destination);
  let t=ac.currentTime;
  function schedBeat(){
    for(let i=0;i<notes.length;i++){
      const osc=ac.createOscillator();const g=ac.createGain();
      osc.type="triangle";osc.frequency.value=notes[i];
      g.gain.setValueAtTime(0,t+i*0.28);
      g.gain.linearRampToValueAtTime(0.5,t+i*0.28+0.05);
      g.gain.linearRampToValueAtTime(0,t+i*0.28+0.25);
      osc.connect(g);g.connect(masterGain);
      osc.start(t+i*0.28);osc.stop(t+i*0.28+0.3);
      lobbyMusicNodes.push(osc);
    }
    t+=notes.length*0.28+0.5;
  }
  for(let r=0;r<30;r++)schedBeat();
}

function playGameMusic(){
  stopAllMusic();
  const ac=getAudio();
  const masterGain=ac.createGain();masterGain.gain.value=0.06;masterGain.connect(ac.destination);
  // 박진감 있는 반복 드럼+베이스
  const bass=[98,110,98,130];
  let t=ac.currentTime;
  for(let rep=0;rep<60;rep++){
    for(let i=0;i<4;i++){
      // 베이스
      const osc=ac.createOscillator();const g=ac.createGain();
      osc.type="sawtooth";osc.frequency.value=bass[i];
      g.gain.setValueAtTime(0,t+i*0.22);
      g.gain.linearRampToValueAtTime(0.6,t+i*0.22+0.04);
      g.gain.linearRampToValueAtTime(0,t+i*0.22+0.18);
      osc.connect(g);g.connect(masterGain);
      osc.start(t+i*0.22);osc.stop(t+i*0.22+0.2);
      gameMusicNodes.push(osc);
      // 킥
      const kick=ac.createOscillator();const kg=ac.createGain();
      kick.type="sine";kick.frequency.setValueAtTime(150,t+i*0.22);
      kick.frequency.exponentialRampToValueAtTime(40,t+i*0.22+0.1);
      kg.gain.setValueAtTime(0.5,t+i*0.22);kg.gain.exponentialRampToValueAtTime(0.001,t+i*0.22+0.15);
      kick.connect(kg);kg.connect(masterGain);
      kick.start(t+i*0.22);kick.stop(t+i*0.22+0.16);
      gameMusicNodes.push(kick);
    }
    t+=4*0.22+0.12;
  }
}

function stopAllMusic(){
  [...lobbyMusicNodes,...gameMusicNodes].forEach(n=>{try{n.stop();}catch(e){}});
  lobbyMusicNodes=[];gameMusicNodes=[];
}

function pathTotalLen(P){
  let l=0;for(let i=0;i<P.length-1;i++)l+=Math.hypot(P[i+1].x-P[i].x,P[i+1].y-P[i].y);return l;
}
function enemyTraveledLen(e){
  const P=e.path;let l=0;
  for(let i=0;i<e.pt-1&&i<P.length-1;i++)l+=Math.hypot(P[i+1].x-P[i].x,P[i+1].y-P[i].y);
  if(e.pt<P.length&&e.pt>0){const a=P[e.pt-1];l+=Math.hypot(e.x-a.x,e.y-a.y);}
  return l;
}

class Summon{
  constructor(ownerTower,pathIdx){
    this.owner=ownerTower;
    const lv=ownerTower.lv;
    const c=ownerTower.char;
    this.hp=c.summonHp[lv];
    this.maxHp=this.hp;
    this.pathIdx=pathIdx;
   const paths=getActivePaths();
if(!paths||!paths.length){this.dead=true;return;}
let fullPath = [...paths[pathIdx % paths.length]];

if (DIFF[currentDiff]?.hardMode) {
  fullPath = fullPath.concat(
    PATHS.main.map(p => ({
      x: p.x * canvas.width,
      y: p.y * canvas.height
    }))
  );
}

this.path = fullPath.reverse();

this.x = this.path[0].x;
this.y = this.path[0].y;
this.x=this.path[0].x;this.y=this.path[0].y;
this.pt=1;
this.speed=c.unitMoveSpeed?c.unitMoveSpeed[lv]:SPEED.normal;
    this.dead=false;
    this.color=c.color;
  }
  update(){
    const tgt=this.path[this.pt];
    if(!tgt){this.dead=true;return;}// 끝 도달 시 그냥 사라짐
    const dx=tgt.x-this.x,dy=tgt.y-this.y,d=Math.hypot(dx,dy);
    if(d<this.speed+2){this.pt++;return;}
    this.x+=dx/d*this.speed;this.y+=dy/d*this.speed;
    // 적과 충돌
    for(const e of game.enemies){
      if(e.dead)continue;
      if(Math.hypot(e.x-this.x,e.y-this.y)<e.radius+10){
        const diff=this.hp-e.hp;
        if(diff>0){e.dead=true;game.cash+=e.reward;this.hp-=e.hp;updateHUD();}
        else if(diff<0){this.dead=true;e.hp-=this.hp;}
        else{this.dead=true;e.dead=true;game.cash+=e.reward;updateHUD();}
        return;
      }
    }
  }
  draw(){
    if(this.dead)return;
    ctx.fillStyle=this.color;ctx.globalAlpha=0.9;
    ctx.beginPath();ctx.arc(this.x,this.y,10,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    ctx.font="13px serif";ctx.textAlign="center";ctx.fillText("🦉",this.x,this.y+5);
    const bw=22,bh=4,bx=this.x-11,by=this.y-18;
    ctx.fillStyle="#111";ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle="#90a4ae";ctx.fillRect(bx,by,bw*(this.hp/this.maxHp),bh);
  }
}

class Enemy{
  constructor(type,hp,pathIdx){

    this.type=type;

    const d=ENEMY_BASE[type]||ENEMY_BASE.slime;

    const paths=getActivePaths();
    const basePath=paths[pathIdx % paths.length];

    if(DIFF[currentDiff]?.hardMode){

      const main=PATHS.main.map(p=>({
        x:p.x*canvas.width,
        y:p.y*canvas.height
      }));

      this.path=[...basePath,...main.slice(1)];

    }else{

      this.path=basePath;

    }

    this.x=this.path[0].x;
    this.y=this.path[0].y;

    this.hp=Math.round(hp);
    this.maxHp=Math.round(hp);
    this.baseSpd=d.speed;
    this.radius=d.radius;
    this.color=d.color;
    this.liveDmg=d.liveDmg;
    this.reward=d.reward;
    this.special=d.special||null;
    this.flying=d.flying||false;
    this.pt=1;
    this.dead=false;
    this.stunTimer=0;
    this.revived=false;
    this.reviveTimer=0;
    this.invincible=false;
    this.poison=null;
     this.type=type;
  }
  update(){
      // 슬로우 처리
        // 독 처리
  if(this.poison){

    this.poison.timer--;
    this.poison.tick--;


    // 1초마다 독 데미지
    if(this.poison.tick<=0){

      this.takeDamage(this.poison.damage);

      this.poison.tick=60;
    }


    // 독 종료
    if(this.poison.timer<=0){

      this.poison=null;

    }
  }

if (this._slowTimer > 0) {
  this._slowTimer--;
  this.baseSpd = (ENEMY_BASE[this.type] || ENEMY_BASE.slime).speed * (1 - (this._slowPct || 0));

  if (this._slowTimer <= 0) {
    this.baseSpd = (ENEMY_BASE[this.type] || ENEMY_BASE.slime).speed;
    this._slowPct = 0;
  }
}
    if(this.invincible){
      this.reviveTimer--;
      if(this.reviveTimer<=0){this.invincible=false;this.hp=Math.round(50*game.waveHpMul);}
      return;
    }
    if(this.stunTimer>0){this.stunTimer--;return;}
    const tgt=this.path[this.pt];
    if(!tgt){game.lives=Math.max(0,game.lives-this.liveDmg);this.dead=true;updateHUD();return;}
    const dx=tgt.x-this.x,dy=tgt.y-this.y,d=Math.hypot(dx,dy);
   if(d<this.baseSpd+2){
  this.x=tgt.x;
  this.y=tgt.y;

  this.pt++;

  if(this.pt>=this.path.length){
    game.lives=Math.max(0,game.lives-this.liveDmg);
    this.dead=true;
    updateHUD();
    return;
  }
}
    else{this.x+=dx/d*this.baseSpd;this.y+=dy/d*this.baseSpd;}
  }
  takeDamage(dmg){
    if(this.invincible)return;
    this.hp-=dmg;
    if(this.hp<=0){
      if(this.special==="revive"&&!this.revived){
        this.revived=true;this.invincible=true;this.reviveTimer=120;// 2초@60fps
        this.hp=0;
      }else{
        this.dead=true;game.cash+=this.reward;updateHUD();
      }
    }
  }
    applyPoison(dmg,time){
  if(this.poison)return;

  this.poison={
    damage:dmg,
    timer:time*60,
    tick:60
  };
}
  draw(){
    if(this.invincible){
      if(Math.floor(Date.now()/100)%2===0)return;
    }
    const x=this.x,y=this.y,r=this.radius;

    // 비행 타입: 그림자 + 높이감
    if(this.flying){
      // 땅 그림자
      ctx.fillStyle="rgba(0,0,0,.2)";
      ctx.beginPath();ctx.ellipse(x,y+r+4,r*.8,r*.3,0,0,Math.PI*2);ctx.fill();
    }

    ctx.save();
    if(this.flying) ctx.translate(x,y-8); // 살짝 위로 떠있는 효과
    else ctx.translate(x,y);
    this._drawBody(r);

    // 비행 타입: 날개
    if(this.flying){
      const wing=Math.sin(Date.now()*.008)*0.3;

class Puddle {
  constructor(x, y, radius, dmgPerSec, dur, slowPct, color) {
    this.x = x;
    this.y = y;
    this.radius = radius;
    this.dmgPerSec = dmgPerSec;
    this.slowPct = slowPct;
    this.color = color;

    this.timer = dur;
    this.dead = false;
    this.tickTimer = 0;
  }

  update() {
    if (this.dead) return;

    this.timer--;
    if (this.timer <= 0) {
      this.dead = true;
      return;
    }

    this.tickTimer++;

    // 1초마다 데미지 + 슬로우 적용
    if (this.tickTimer >= 60) {
      this.tickTimer = 0;

      game.enemies.forEach(e => {
        if (e.dead || e.flying) return;

        const dist = Math.hypot(e.x - this.x, e.y - this.y);

        if (dist < this.radius) {
          e.takeDamage(this.dmgPerSec);

          // 슬로우 적용
          if (!e._slowTimer || e._slowTimer <= 0) {
            e._baseSpdBackup = e._baseSpdBackup || e.baseSpd;
            e.baseSpd = e.baseSpd * (1 - this.slowPct);
          }

          e._slowPct = this.slowPct;
          e._slowTimer = 60;
        }
      });
    }

    // 슬로우 복구 처리
    game.enemies.forEach(e => {
      if (!e._slowTimer) return;

      e._slowTimer--;

      if (e._slowTimer <= 0 && e._baseSpdBackup != null) {
        e.baseSpd = e._baseSpdBackup;
        e._baseSpdBackup = null;
      }
    });
  }

  draw() {
    ctx.fillStyle = this.color + "99";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
  }
}
class Tower{
  constructor(x,y,charData){
    this.x=x;this.y=y;this.char=charData;this.lv=0;this.coolTimer=0;this.selected=false;
    this.targetMode=0;// 0=First,1=Last,2=Strongest
    this.totalInvested=charData.cost[0];
    this.summons=[];
    this.summonPathIdx=0;
   this.poisonDamage = this.char.poisonDamage ? this.char.poisonDamage[this.lv] : 0;
this.poisonDuration = this.char.poisonDuration ? this.char.poisonDuration[this.lv] : 0;
    // 소환수 즉시 소환
    if(charData.type==="summon")this._spawnSummon();
  }
  get atk(){return this.char.atk?Math.round(this.char.atk[this.lv]):0;}
  get rangePx(){return this.char.rangeTile?(this.char.rangeTile[this.lv]*TILE*0.5):0;}
  get cdTicks(){return this.char.cd?Math.round(this.char.cd[this.lv]*60):0;}
  get upgCost(){
    const maxLv=this.char.maxLv??2;
    return this.lv<maxLv?this.char.cost[this.lv+1]:null;
  }

  _spawnSummon(){
    const paths=getActivePaths();
    const s=new Summon(this,this.summonPathIdx%paths.length);
    this.summons.push(s);game.summons.push(s);
    this.summonPathIdx++;
  }

  // 실제 스펙 (버프 적용)
  get atkFinal(){
    const base=this.char.atk?Math.round(this.char.atk[this.lv]):0;
    const buf=this._buffs?this._buffs.dmg:0;
    return Math.round(base*(1+buf));
  }

  get rangePxFinal(){
    const base=this.char.rangeTile?(this.char.rangeTile[this.lv]*TILE*0.5):0;
    const buf=this._buffs?this._buffs.range:0;
    return base*(1+buf);
  }

  get cdTicksFinal(){
    const base=this.char.cd?Math.round(this.char.cd[this.lv]*60):0;
    const buf=this._buffs?this._buffs.cd:0;
    return Math.max(1,Math.round(base*(1-buf)));
  }

  _pickTarget(){
    const mode=TARGET_MODES[this.targetMode];
    const isAoe=this.char.type==="aoe";

    let candidates=game.enemies.filter(e=>{
      if(e.dead||e.invincible)return false;
      if(isAoe&&e.flying)return false;
      return Math.hypot(e.x-this.x,e.y-this.y)<this.rangePxFinal;
    });

    if(!candidates.length)return null;

    if(mode==="First")
      return candidates.reduce((a,b)=>enemyTraveledLen(b)>enemyTraveledLen(a)?b:a);

    if(mode==="Last")
      return candidates.reduce((a,b)=>enemyTraveledLen(b)<enemyTraveledLen(a)?b:a);

    if(mode==="Strongest")
      return candidates.reduce((a,b)=>b.hp>a.hp?b:a);

    return candidates[0];
  }

  update(){
    this._buffs={dmg:0,range:0,cd:0};
      for(const tower of game.towers){
  if(tower.char.type!=="buffer") continue;

  const dist=Math.hypot(tower.x-this.x,tower.y-this.y);

  if(dist<=tower.rangePxFinal){
    this._buffs.dmg=Math.max(
      this._buffs.dmg,
      tower.char.dmgBuff[tower.lv]
    );
  }
}

    if(this.char.type==="summon"){

      this.summons=this.summons.filter(s=>!s.dead);

      if(this.coolTimer>0){
        this.coolTimer--;
        return;
      }

      this._spawnSummon();
      this.coolTimer=this.cdTicksFinal;

  }else if(this.char.type==="moneygen"){

  if(this.char.cashPerWave){
    // 펭귄 에이전트
    // 웨이브 끝날 때 지급

  }else{
    // 너구리
    if(this.coolTimer>0){
      this.coolTimer--;
      return;
    }

    const t=this._pickTarget();

    if(t){
      const blast=this.char.blastPx?this.char.blastPx[this.lv]:0;

      game.bullets.push(
        new Bullet(
          this.x,
          this.y,
          t,
          this.atkFinal,
          this.char.color,
          blast,
          this.poisonDamage||0,
          this.poisonDuration||0,
          this
        )
      );

      this.coolTimer=this.cdTicksFinal;
    }
      }
    
    }else if(this.char.type==="snakeLord"){

      if(this.coolTimer>0){
        this.coolTimer--;
        return;
      }

      const enemies=game.enemies.filter(e=>!e.dead&&!e.invincible);

      if(enemies.length){
        const target=enemies.reduce((a,b)=>
          enemyTraveledLen(b)>enemyTraveledLen(a)?b:a
        );

        target.stunTimer=this.char.stun[this.lv];
      }

      this.coolTimer=this.cdTicksFinal;

    }else if(this.char.type==="puddle"){

      if(this.coolTimer>0){
        this.coolTimer--;
        return;
      }

      const t=this._pickTarget();

      if(t){
        game.puddles.push(
          new Puddle(
            t.x,
            t.y,
            this.char.blastPx[this.lv],
            this.atkFinal,
            this.char.puddleDur[this.lv],
            this.char.slowPct,
            this.char.color
          )
        );

        this.coolTimer=this.cdTicksFinal;
      }
       
    }else if(this.char.type==="fan"){

  if(this.coolTimer>0){
    this.coolTimer--;
    return;
  }

  this._attackFan();

  this.coolTimer=this.cdTicksFinal;

}

  else{

      if(this.coolTimer>0){
        this.coolTimer--;
        return;
      }

      const t=this._pickTarget();

      if(t){
        const blast=this.char.blastPx?this.char.blastPx[this.lv]:0;

       game.bullets.push(
  new Bullet(
    this.x,
    this.y,
    t,
    this.atkFinal,
    this.char.color,
    blast,
    this.poisonDamage || 0,
    this.poisonDuration || 0,
    this
  )
);

        this.coolTimer=this.cdTicksFinal;
      }
    }
  }
    _attackFan(){

  const target=this._pickTarget();

  if(!target)return;


  const baseAngle=Math.atan2(
    target.y-this.y,
    target.x-this.x
  );


  const angleRange=
    (this.char.fanAngle[this.lv]||70)
    *Math.PI/180/2;


  for(const e of game.enemies){

    if(e.dead||e.invincible)continue;


    const dx=e.x-this.x;
    const dy=e.y-this.y;

    const dist=Math.hypot(dx,dy);


    if(dist>this.rangePxFinal)continue;


    let angle=Math.atan2(dy,dx);

    let diff=Math.abs(angle-baseAngle);

    if(diff>Math.PI){
      diff=2*Math.PI-diff;
    }


if(diff<=angleRange){

  e.takeDamage(this.atkFinal);
     
  }
}
         this.fanEffectTimer=8;
this.fanEffectAngle=this.char.fanAngle[this.lv];
this.fanEffectDir=baseAngle;
        }

draw(){
   if(this.selected && this.char.type==="fan"){

  const angle =
    typeof this.fanEffectDir==="number"
    ? this.fanEffectDir
    : 0;

  const spread =
    this.char.fanAngle[this.lv]
    *Math.PI/180/2;


  ctx.save();

  ctx.strokeStyle="rgba(255,255,255,0.35)";
  ctx.lineWidth=1.5;


  ctx.beginPath();

  ctx.moveTo(this.x,this.y);

  ctx.arc(
    this.x,
    this.y,
    this.rangePx,
    angle-spread,
    angle+spread
  );

  ctx.closePath();

  ctx.stroke();

  ctx.restore();

}
    if(this.selected){
      ctx.strokeStyle="rgba(255,255,255,.2)";ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(this.x,this.y,this.rangePx,0,Math.PI*2);ctx.stroke();

    if(this._buffs && this._buffs.dmg>0){
  ctx.strokeStyle="#00ff66";

}

    ctx.fillStyle=this.char.color;

    ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();

  );
}

    // 타겟모드 뱃지

    ctx.fillStyle=modeColors[this.targetMode];ctx.font="bold 8px Arial";
    ctx.fillText(TARGET_MODES[this.targetMode][0],this.x+12,this.y-10);
  }
}

//  BULLET
// ═══════════════════════════════════════
class Bullet{
constructor(x,y,t,dmg,color,aoeRadius=0,poisonDamage=0,poisonDuration=0,owner){
    this.x=x;this.y=y;this.t=t;this.dmg=Math.round(dmg);
    this.color=color;this.dead=false;this.aoeRadius=aoeRadius;
      this.poisonDamage=poisonDamage;
  this.poisonDuration=poisonDuration;
    this.exploding=false;this.explodeTimer=0;this.explodeX=0;this.explodeY=0;
    this.fanEffectTimer=0;
this.fanEffectAngle=0;
this.fanEffectDir=0;
    this.owner = owner;
  }
  update(){
    if(this.exploding){
      this.explodeTimer--;
      if(this.explodeTimer<=0)this.dead=true;
      return;
    }
    if(!this.t||this.t.dead){this.dead=true;return;}
    const dx=this.t.x-this.x,dy=this.t.y-this.y,d=Math.hypot(dx,dy);
    if(d<9){
      if(this.aoeRadius>0){
        // AOE 폭발
        this.explodeX=this.t.x;this.explodeY=this.t.y;
        this.exploding=true;this.explodeTimer=18;
        game.enemies.forEach(e=>{
          if(e.dead||e.invincible||e.flying)return; // 비행 타입은 AOE 면역
          if(Math.hypot(e.x-this.explodeX,e.y-this.explodeY)<this.aoeRadius){
            e.takeDamage(this.dmg);
          }
        });
      }else{
this.t.takeDamage(this.dmg);

if(this.owner?.char.cashPerHit){
  game.cash += this.owner.char.cashPerHit[this.owner.lv];
}

if(this.poisonDamage>0){
  this.t.applyPoison(
    this.poisonDamage,
    this.poisonDuration
  );
}

this.dead=true;
      }
    }else{this.x+=dx/d*8;this.y+=dy/d*8;}
  }
  draw(){
    if(this.exploding){
      // 폭발 이펙트
      const prog=1-(this.explodeTimer/18);
      const r=this.aoeRadius*prog;
      const alpha=1-prog;
      ctx.strokeStyle=`rgba(255,160,0,${alpha})`;ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(this.explodeX,this.explodeY,r,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle=`rgba(255,200,50,${alpha*0.3})`;
      ctx.beginPath();ctx.arc(this.explodeX,this.explodeY,r,0,Math.PI*2);ctx.fill();
      return;
    }
    ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,4,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle="#fff";ctx.lineWidth=.7;ctx.stroke();
  }
}

// ═══════════════════════════════════════
//  GAME INIT
// ═══════════════════════════════════════
function startGame(diff){
  const deckChars=saveData.deck.filter(Boolean).map(id=>CHARS.find(c=>c.id===id)).filter(Boolean);
  if(!deckChars.length){alert("덱에 캐릭터를 편성해주세요!");return;}
  currentDiff=diff;
  const d=DIFF[diff];
  game={
    diff,d,
    cash:d.startCash,
    diamonds:0,
    lives:d.lives,
    wave:1,
    waveHpMul:1,
    enemies:[],towers:[],bullets:[],summons:[],puddles:[],
    phase:"spawn",
    deckChars,
    spawnQueue:[],spawnTimer:0,
      skipUsed:false,
    _ended:false,
  };
  selectedShopChar=deckChars[0];selectedTower=null;
  setSpeed(1);
  _setSkipBtn(false);
  buildShop(deckChars);
  stopAllMusic();showScreen("game-screen");
  resizeCanvas();
  genObstacles(diff);filterObstacles();
  updateHUD();hideUpgradePanel();
  spawnWave();
  try{playGameMusic();}catch(e){}
  if(animId)cancelAnimationFrame(animId);animId=null;
  loop();
}

function buildShop(chars){
  const el=document.getElementById("tower-shop");el.innerHTML="";
  chars.forEach((c,i)=>{
    const card=document.createElement("div");card.className="shop-card"+(i===0?" selected":"");
    card.innerHTML=`<div class="shop-card-top"><span>${c.emoji}</span><span class="shop-card-name">${c.name}</span></div><div class="shop-card-cost">💵 ${c.cost[0]}캐쉬</div>`;
    card.onclick=()=>{
      selectedShopChar=c;selectedTower=null;hideUpgradePanel();
      el.querySelectorAll(".shop-card").forEach(b=>b.classList.remove("selected"));
      card.classList.add("selected");setMsg("클릭해서 타워를 설치하세요");
    };
    el.appendChild(card);
  });
}

// ═══════════════════════════════════════
//  SPAWN
// ═══════════════════════════════════════
function spawnWave(){
  const d=game.d,w=game.wave;
  game._betweenFired=false;

  if(w>1){
    const cashGrant=(d.cashPerWave||20)+(w-2)*(d.cashBonus||1);
    game.cash+=cashGrant;
  }

  if(d.waveDiamond>0) game.diamonds+=d.waveDiamond;

  const mul=getHpMul(game.diff,w);
  game.waveHpMul=mul;

  const configs=getWaveEnemies(game.diff,w);
  game.spawnQueue=[];

  let offset=0;
  const paths=getActivePaths();

  configs.forEach(cfg=>{
    for(let i=0;i<cfg.n;i++){
      const base=ENEMY_BASE[cfg.t].baseHp;

      game.spawnQueue.push({
        type:cfg.t,
        hp:base*mul*cfg.m,
        reward:Math.floor(ENEMY_BASE[cfg.t].reward * cfg.m),
        delay:offset*55,
        pathIdx:paths.length>1?i%paths.length:0
      });

      offset++;
    }
  });

  game.spawnTimer=0;
  game.phase="spawn";
  game.skipUsed=false;
  _setSkipBtn(false);
  updateHUD();
}

// ═══════════════════════════════════════
//  HUD
// ═══════════════════════════════════════
function updateHUD(){
  document.getElementById("h-cash").textContent=Math.floor(game.cash);
}
function setMsg(t){document.getElementById("msg").textContent=t;}

function drawHUD(){
  const W=canvas.width;
  const fontSize=28;
  ctx.font=`bold ${fontSize}px Arial`;
  ctx.textAlign="center";
  // 배경
  ctx.fillStyle="rgba(0,0,0,.55)";
  ctx.fillRect(W/2-190,5,380,40);
  // 왼쪽: 베이스 체력
  const hpColor=game.lives>5?"#4caf50":game.lives>2?"#ff9800":"#f44336";
  ctx.fillStyle=hpColor;
  ctx.fillText(`❤️ ${game.lives}`,W/2-125,37);
  // 가운데: 돈 (크게)
  ctx.fillStyle="#f0c040";
  ctx.fillText(`💵 ${Math.floor(game.cash)}`,W/2,37);
  // 오른쪽: 웨이브
  ctx.fillStyle="#f0c040";
  ctx.fillText(`🌊${game.wave}/${game.d.infinite?"∞":game.d.waves}`,W/2+125,37);
}

// ═══════════════════════════════════════
//  CANVAS CLICK
// ═══════════════════════════════════════
canvas.addEventListener("click",e=>{
  if(!game.d)return;
  const r=canvas.getBoundingClientRect();
  const cx=e.clientX-r.left,cy=e.clientY-r.top;
  // 기존 타워 클릭?
  for(const t of game.towers){
    if(Math.hypot(t.x-cx,t.y-cy)<22){
      game.towers.forEach(tt=>tt.selected=false);
      t.selected=true;selectedTower=t;showUpgradePanel(t);return;
    }
  }
  // 빈 곳 클릭 → 선택 해제만
  game.towers.forEach(tt=>tt.selected=false);selectedTower=null;hideUpgradePanel();

  if(!selectedShopChar)return;
  if(game.cash<selectedShopChar.cost[0]){setMsg("💵 캐쉬가 부족합니다!");return;}
  if(isOnAnyPath(cx,cy)){setMsg("경로 위에는 설치할 수 없습니다!");return;}
  if(isOnObstacle(cx,cy)){setMsg("구조물 위에는 설치할 수 없습니다!");return;}
  if(isOnWater(cx,cy)){setMsg("물 위에는 설치할 수 없습니다!");return;}
  // 같은 타일에 이미 타워 있으면 설치 불가
  const tileX=Math.floor(cx/TILE), tileY=Math.floor(cy/TILE);
  const sameTile=game.towers.some(t=>Math.floor(t.x/TILE)===tileX&&Math.floor(t.y/TILE)===tileY);
  if(sameTile){setMsg("이미 타워가 있습니다!");return;}
  // maxCount 체크 (부엉이, 독수리 등)
  if(selectedShopChar.maxCount!=null){
    const cnt=game.towers.filter(t=>t.char.id===selectedShopChar.id).length;
    if(cnt>=selectedShopChar.maxCount){setMsg(`${selectedShopChar.name}는 최대 ${selectedShopChar.maxCount}마리만 설치 가능!`);return;}
  }
  game.cash-=selectedShopChar.cost[0];
  game.towers.push(new Tower(cx,cy,selectedShopChar));
  // 설치 후 selectedShopChar 유지하되 샵카드 선택상태 해제 (연속설치 방지)
  selectedShopChar=null;
  document.querySelectorAll(".shop-card").forEach(b=>b.classList.remove("selected"));
  updateHUD();setMsg("타워 설치 완료! ✓ (다시 선택하려면 아래에서 클릭)");
});

// ═══════════════════════════════════════
//  UPGRADE PANEL
// ═══════════════════════════════════════
function showUpgradePanel(t){
  document.getElementById("left-panel-empty").style.display="none";
  document.getElementById("upg-panel").style.display="flex";
  const lv=t.lv, maxLv=t.char.maxLv??2;
  document.getElementById("upg-title").textContent=`${t.char.emoji} ${t.char.name}`;
  document.getElementById("upg-lv-val").textContent=`${lv+1}/${maxLv+1}`;
  if(t.char.type==="summon"){
    document.getElementById("upg-atk-val").textContent=`소환HP ${t.char.summonHp[lv]}`;
    document.getElementById("upg-atk-next").textContent=lv<maxLv?`→ ${t.char.summonHp[lv+1]}`:"";
    document.getElementById("upg-range-val").textContent="—";
    document.getElementById("upg-range-next").textContent="";
    document.getElementById("upg-cd-val").textContent=t.char.cd[lv]+"s";
    document.getElementById("upg-cd-next").textContent="";
  }else if(t.char.type==="aoe"){
    document.getElementById("upg-atk-val").textContent=`${t.atk} (💥${[1,1.5,2][lv]}m)`;
    document.getElementById("upg-atk-next").textContent=lv<maxLv?`→ ${t.char.atk[lv+1]} (💥${[1,1.5,2][lv+1]}m)`:"";
    document.getElementById("upg-range-val").textContent=t.char.rangeTile[lv]+"타일";
    document.getElementById("upg-range-next").textContent=lv<maxLv?`→ ${t.char.rangeTile[lv+1]}타일`:"";
    document.getElementById("upg-cd-val").textContent=t.char.cd[lv]+"s";
    document.getElementById("upg-cd-next").textContent=lv<maxLv?`→ ${t.char.cd[lv+1]}s`:"";
}else if(t.char.type==="moneygen"){

  if(t.char.cashPerWave){

    document.getElementById("upg-atk-val").textContent=`💵 웨이브당 ${t.char.cashPerWave[lv]}캐쉬`;
    document.getElementById("upg-atk-next").textContent=
      lv<maxLv?`→ ${t.char.cashPerWave[lv+1]}캐쉬`:"";

    document.getElementById("upg-range-val").textContent="—";
    document.getElementById("upg-range-next").textContent="";

    document.getElementById("upg-cd-val").textContent="웨이브 종료시 지급";
    document.getElementById("upg-cd-next").textContent="";

  }else if(t.char.cashPerHit){

    document.getElementById("upg-atk-val").textContent=`💵 적중당 ${t.char.cashPerHit[lv]}캐쉬`;
    document.getElementById("upg-atk-next").textContent=
      lv<maxLv?`→ ${t.char.cashPerHit[lv+1]}캐쉬`:"";

    document.getElementById("upg-range-val").textContent=t.char.rangeTile[lv]+"타일";
    document.getElementById("upg-range-next").textContent=
      lv<maxLv?`→ ${t.char.rangeTile[lv+1]}타일`:"";

    document.getElementById("upg-cd-val").textContent=t.char.cd[lv]+"s";
    document.getElementById("upg-cd-next").textContent=
      lv<maxLv?`→ ${t.char.cd[lv+1]}s`:"";

  }

}else{
    document.getElementById("upg-atk-val").textContent=t.atk;
    document.getElementById("upg-atk-next").textContent=lv<maxLv?`→ ${t.char.atk[lv+1]}`:"";
    document.getElementById("upg-range-val").textContent=t.char.rangeTile[lv]+"타일";
    document.getElementById("upg-range-next").textContent=lv<maxLv?`→ ${t.char.rangeTile[lv+1]}타일`:"";
    document.getElementById("upg-cd-val").textContent=t.char.cd[lv]+"s";
    document.getElementById("upg-cd-next").textContent=lv<maxLv?`→ ${t.char.cd[lv+1]}s`:"";
  }  const cost=t.upgCost;
  const btn=document.getElementById("upg-btn");
  if(cost!==null){btn.innerHTML=`업그레이드<br><small>(${cost}캐쉬)</small><br><span style="font-size:9px;opacity:.7">[E]</span>`;btn.disabled=false;}
  else{btn.innerHTML=`최대 레벨<br>★★★`;btn.disabled=true;}
  const sellAmt=Math.round(t.totalInvested*0.5);
  document.getElementById("sell-btn").innerHTML=`판매<br><small>+${sellAmt}캐</small><br><span style="font-size:9px;opacity:.7">[X]</span>`;
  document.getElementById("target-btn").textContent=`타겟: ${TARGET_MODES[t.targetMode]} [R]`;
  document.getElementById("invest-label").textContent=`총 투자: ${t.totalInvested}캐쉬`;
}
function hideUpgradePanel(){
  document.getElementById("left-panel-empty").style.display="flex";
  document.getElementById("upg-panel").style.display="none";
}

document.getElementById("close-upg-btn").onclick=()=>{
  game.towers&&game.towers.forEach(t=>t.selected=false);selectedTower=null;hideUpgradePanel();
};
document.getElementById("upg-btn").onclick=()=>doUpgrade();
document.getElementById("sell-btn").onclick=()=>doSell();
document.getElementById("target-btn").onclick=()=>doTargetChange();

function doUpgrade(){
  if(!selectedTower)return;
  const cost=selectedTower.upgCost;if(cost===null)return;
  if(game.cash<cost){setMsg("캐쉬 부족!");return;}
  game.cash-=cost;selectedTower.lv++;selectedTower.totalInvested+=cost;
  if(selectedTower.char.type==="summon"){
    selectedTower.summons.forEach(s=>s.dead=true);selectedTower.summons=[];selectedTower.coolTimer=0;
  }
  updateHUD();showUpgradePanel(selectedTower);
}
function doSell(){
  if(!selectedTower)return;
  const amt=Math.round(selectedTower.totalInvested*0.5);
  game.cash+=amt;
  selectedTower.summons&&selectedTower.summons.forEach(s=>s.dead=true);
  game.towers=game.towers.filter(t=>t!==selectedTower);
  selectedTower=null;hideUpgradePanel();updateHUD();
}
function doTargetChange(){
  if(!selectedTower)return;
  selectedTower.targetMode=(selectedTower.targetMode+1)%3;
  showUpgradePanel(selectedTower);
}

// ═══════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ═══════════════════════════════════════
document.addEventListener("keydown",e=>{
  if(!document.getElementById("game-screen").classList.contains("active"))return;
  if(e.key==="e"||e.key==="E")doUpgrade();
  if(e.key==="x"||e.key==="X")doSell();
  if(e.key==="r"||e.key==="R")doTargetChange();
  if(e.key==="t"||e.key==="T"){game.towers&&game.towers.forEach(t=>t.selected=false);selectedTower=null;hideUpgradePanel();}
});

// ═══════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════
function loop(){
  if(!game || !game.d || game._ended) return;

  // ── 틱 처리
  const ticks = (game.phase==="between") ? 1 : gameSpeed;
  for(let i=0;i<ticks;i++){
    if(!game||game._ended) return;
    runTick();
  }

  // ── 그리기
  if(!game||game._ended) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // 배경은 drawPaths가 처리
  drawPaths(); drawObstacles();
  game.towers.forEach(t=>t.draw());
  if(game.puddles) game.puddles.forEach(p=>p.draw());
  game.summons.forEach(s=>s.draw());
  game.enemies.forEach(e=>e.draw());
  game.bullets.forEach(b=>b.draw());
  drawHUD();

  if(game.phase==="between"){
    const pct=Math.max(0,1-(waveTimer/WAVE_DELAY));
    document.getElementById("wave-bar").style.width=(pct*100)+"%";
    setMsg(`다음 웨이브까지 ${Math.ceil((WAVE_DELAY-waveTimer)/60)}초...`);
  }else{
    document.getElementById("wave-bar").style.width="100%";
  }

  animId=requestAnimationFrame(loop);
}

// 스킵 실제 처리 (loop 밖에서만 호출)
function _doSkip(){
  if(!game||game._ended) return;
  if(game.phase!=="fight"&&game.phase!=="spawn") return;

  game.wave++;
  updateHUD();
  if(!game.d.infinite && game.wave>game.d.waves){ endGame(true); return; }

  const d=game.d, w=game.wave;
  if(w>1) game.cash+=(d.cashPerWave||20)+(w-2)*(d.cashBonus||1);
  if(d.waveDiamond>0) game.diamonds+=d.waveDiamond;

  const mul=getHpMul(game.diff,w);
  game.waveHpMul=mul;
  const configs=getWaveEnemies(game.diff,w);
  const paths=getActivePaths();
  const newQueue=[];
  let offset=0;
  configs.forEach(cfg=>{
    for(let i=0;i<cfg.n;i++){
      const base=ENEMY_BASE[cfg.t].baseHp;
      newQueue.push({type:cfg.t,hp:base*mul*cfg.m,delay:offset*55,pathIdx:paths.length>1?i%paths.length:0});
      offset++;
    }
  });
  game.spawnQueue=newQueue;
  game.spawnTimer=0;
  game.phase="spawn";
  updateHUD();
  setMsg("다음 웨이브 시작!");
  // 스킵 버튼 UI 잠금
  _setSkipBtn(false);
}

function runTick(){
  if(!game||game._ended) return;

  // ── 스폰
  if(game.phase==="spawn"){
    game.spawnTimer++;
    game.spawnQueue=game.spawnQueue.filter(s=>{
      if(game.spawnTimer>=s.delay){
        game.enemies.push(new Enemy(s.type,s.hp,s.pathIdx));
        return false;
      }
      return true;
    });
    if(game.spawnQueue.length===0 && game.spawnTimer>0) game.phase="fight";
  }
    
  // ── 엔티티 업데이트
  game.enemies.forEach(e=>e.update());
  game.towers.forEach(t=>t.update());
  game.summons.forEach(s=>s.update());
  game.bullets.forEach(b=>b.update());
  if(game.puddles) game.puddles.forEach(p=>p.update());

  // ── 정리
  game.enemies=game.enemies.filter(e=>!e.dead);
  game.bullets=game.bullets.filter(b=>!b.dead||b.exploding);
  game.summons=game.summons.filter(s=>!s.dead);
  if(game.puddles) game.puddles=game.puddles.filter(p=>!p.dead);

  // ── 중간지점 체크 (스킵 잠금 해제) — 아직 잠겨있을 때만
  if(
    !game.skipUsed &&
    !skipUnlocked &&
    (game.phase==="fight"||game.phase==="spawn")
){
    const paths=getActivePaths();
    const halves=paths.map(p=>pathTotalLen(p)*0.5);
    const passed=game.enemies.some(e=>{
      const idx=paths.indexOf(e.path);
      return enemyTraveledLen(e)>=halves[idx>=0?idx:0];
    });
    if(passed) _setSkipBtn(true); // UI만 업데이트, 즉시 skipWave 호출 안 함
  }

  // ── fight → between 전환
  if(game.phase==="fight" && game.enemies.length===0){
    game.phase="between";
    waveTimer=0;
    _setSkipBtn(false);
    // 돈캐 지급
    let mg=0;
game.towers.forEach(t=>{
  if(t.char.type==="moneygen" && t.char.cashPerWave){
    mg += t.char.cashPerWave[t.lv];
  }
});

if(mg>0){
  game.cash += mg;
  updateHUD();
  setMsg(`💵 돈캐 +${mg}캐쉬!`);
}
      }

  // ── between 카운트
  if(game.phase==="between"){
    waveTimer++;
    if(waveTimer>=WAVE_DELAY && !game._betweenFired){
      game._betweenFired=true;
      game.wave++; updateHUD();
      if(!game.d.infinite && game.wave>game.d.waves){ endGame(true); return; }
      spawnWave();
      setMsg("클릭해서 타워를 설치하세요");
    }
  }

  // ── 게임오버
  if(game.lives<=0 && !game._ended) endGame(false);
}






// ══�
// ═══════════════════════════════════════
//  END GAME
// ═══════════════════════════════════════
function endGame(win){
  if(game._ended)return;
  game._ended=true;
  if(animId){cancelAnimationFrame(animId);animId=null;}

  // 다이아 계산: 클리어시 클리어값만, 게임오버시 웨이브 다이아만
  let diamondGain=0;
  if(win){
    diamondGain=game.d.diamondClear; // 클리어 보상만
  } else {
    diamondGain=game.diamonds; // 웨이브에서 번 다이아만
  }

  saveData.diamonds+=diamondGain;

  // 클리어 보상 해금 — unlockClear가 해당 난이도인 캐릭터 자동 해금
  if(win){
    CHARS.forEach(c=>{
      if(c.unlockClear===game.diff && !saveData.ownedChars.includes(c.id)){
        saveData.ownedChars.push(c.id);
      }
    });
  }
  persistSave();

  // 마지막 프레임 그리기
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // 배경은 drawPaths가 처리
  drawPaths();drawObstacles();
  game.towers.forEach(t=>t.draw());
  ctx.fillStyle="rgba(0,0,0,.72)";ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.textAlign="center";
  if(win){
    ctx.fillStyle="#f0c040";
    ctx.font=`bold ${Math.min(canvas.width/7,64)}px Arial`;
    ctx.fillText("CLEAR! 🎉",canvas.width/2,canvas.height/2-24);
    ctx.fillStyle="#eee";ctx.font=`${Math.min(canvas.width/26,22)}px Arial`;
    ctx.fillText(`💎 +${diamondGain} 다이아몬드!`,canvas.width/2,canvas.height/2+22);
  }else{
    ctx.fillStyle="#f44336";
    ctx.font=`bold ${Math.min(canvas.width/7,66)}px Arial`;
    ctx.fillText("GAME OVER",canvas.width/2,canvas.height/2-24);
    ctx.fillStyle="#eee";ctx.font=`${Math.min(canvas.width/26,22)}px Arial`;
    ctx.fillText(`${game.wave}웨이브 종료 | 💎 +${diamondGain}`,canvas.width/2,canvas.height/2+22);
  }
  stopAllMusic();
  setTimeout(backToLobby,win?3500:3000);
}

function backToLobby(){
  if(animId){cancelAnimationFrame(animId);animId=null;}
  game={};
  goLobby();
}

// INIT
goLobby();
